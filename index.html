<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Quest Log">
<meta name="theme-color" content="#07070f">
<title>Quest Log</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#07070f;--bg2:#0c0c18;--surface:#0f0f1e;--surface2:#13132a;
  --text:#e8e4d8;--muted:#5a5a8a;
  --rc:#c87c3a;--rc2:#e8a050;--rc3:#3d2410;
  --glow:0 0 18px rgba(200,124,58,0.4);
  --glow-strong:0 0 36px rgba(200,124,58,0.65);
}

body{
  background:var(--bg);color:var(--text);
  font-family:'Crimson Pro',serif;min-height:100vh;overflow-x:hidden;
  background-image:
    radial-gradient(ellipse 70% 35% at 50% 0%,color-mix(in srgb,var(--rc) 6%,transparent) 0%,transparent 70%),
    repeating-linear-gradient(0deg,transparent,transparent 48px,rgba(255,255,255,0.007) 48px,rgba(255,255,255,0.007) 49px),
    repeating-linear-gradient(90deg,transparent,transparent 48px,rgba(255,255,255,0.007) 48px,rgba(255,255,255,0.007) 49px);
}

/* ── SETUP OVERLAY ── */
#setupOverlay{
  position:fixed;inset:0;z-index:2000;
  background:rgba(7,7,15,0.97);
  display:flex;align-items:center;justify-content:center;
}
#setupOverlay.hidden{display:none}

.setup-card{
  position:relative;border:2px solid var(--rc);
  box-shadow:var(--glow-strong),inset 0 0 60px rgba(0,0,0,0.6);
  padding:48px 56px 40px;text-align:center;width:min(420px,90vw);
  background:linear-gradient(160deg,#0e0e1e 0%,#090912 100%);
}
.setup-card::before,.setup-card::after,.sc-bl,.sc-br{
  content:'';position:absolute;width:20px;height:20px;
  border-color:var(--rc2);border-style:solid;
}
.setup-card::before{top:-2px;left:-2px;border-width:2px 0 0 2px}
.setup-card::after{top:-2px;right:-2px;border-width:2px 2px 0 0}
.sc-bl{bottom:-2px;left:-2px;border-width:0 0 2px 2px}
.sc-br{bottom:-2px;right:-2px;border-width:0 2px 2px 0}

.setup-eyebrow{font-family:'Cinzel',serif;font-size:11px;letter-spacing:5px;color:var(--rc3);text-transform:uppercase;margin-bottom:10px}
.setup-headline{font-family:'Cinzel',serif;font-size:26px;font-weight:900;letter-spacing:4px;color:var(--rc2);text-shadow:0 0 24px var(--rc);margin-bottom:6px;line-height:1.2}
.setup-sub{font-family:'Crimson Pro',serif;font-size:14px;color:var(--muted);margin-bottom:32px;letter-spacing:1px}
.setup-input{
  width:100%;background:var(--bg2);
  border:1px solid var(--rc3);border-bottom:2px solid var(--rc);
  color:var(--rc2);font-family:'Cinzel',serif;font-size:22px;font-weight:700;
  letter-spacing:6px;text-align:center;text-transform:uppercase;
  padding:12px 16px;outline:none;margin-bottom:20px;display:block;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.setup-input:focus{border-color:var(--rc2);box-shadow:0 0 14px var(--rc)}
.setup-input::placeholder{color:#2a2a44;letter-spacing:4px;font-size:16px}
.setup-btn{
  width:100%;background:color-mix(in srgb,var(--rc) 20%,transparent);
  border:1px solid var(--rc);color:var(--rc2);
  font-family:'Cinzel',serif;font-size:12px;letter-spacing:4px;
  padding:12px 24px;cursor:pointer;text-transform:uppercase;
  transition:all 0.15s;
}
.setup-btn:hover{background:color-mix(in srgb,var(--rc) 35%,transparent);box-shadow:var(--glow)}
.setup-btn:active{transform:scale(0.98)}

/* ── HEADER ── */
.header-wrap{display:flex;justify-content:center;padding:36px 24px 0;animation:fadeDown 0.8s ease both}

.player-card{
  position:relative;border:2px solid var(--rc);
  box-shadow:var(--glow),inset 0 0 60px rgba(0,0,0,0.5);
  padding:28px 56px 24px;text-align:center;min-width:min(380px,90vw);
  background:linear-gradient(160deg,#0e0e1e 0%,#090912 100%);
  transition:border-color 0.7s,box-shadow 0.7s;
}
.player-card::before,.player-card::after,.corner-bl,.corner-br{
  content:'';position:absolute;width:20px;height:20px;
  border-color:var(--rc2);border-style:solid;transition:border-color 0.7s;
}
.player-card::before{top:-2px;left:-2px;border-width:2px 0 0 2px}
.player-card::after{top:-2px;right:-2px;border-width:2px 2px 0 0}
.corner-bl{bottom:-2px;left:-2px;border-width:0 0 2px 2px}
.corner-br{bottom:-2px;right:-2px;border-width:0 2px 2px 0}

.edit-name-btn{
  position:absolute;top:10px;right:14px;
  background:none;border:none;cursor:pointer;
  opacity:0.25;transition:opacity 0.2s;padding:4px;line-height:1;
}
.edit-name-btn:hover{opacity:0.85}

.player-name{
  font-family:'Cinzel',serif;font-size:36px;font-weight:900;
  letter-spacing:8px;color:var(--rc2);text-shadow:0 0 32px var(--rc);
  line-height:1;transition:color 0.7s,text-shadow 0.7s;
}
.player-date{
  font-family:'Cinzel',serif;font-size:11px;letter-spacing:4px;
  color:var(--rc3);text-transform:uppercase;margin-top:5px;transition:color 0.7s;
}
.rank-badge-row{margin-top:18px;display:flex;align-items:center;justify-content:center;gap:16px}
.rank-badge-img{width:64px;height:64px;filter:drop-shadow(0 0 8px var(--rc));transition:filter 0.7s;flex-shrink:0}
.rank-text{text-align:left}
.rank-label{
  font-family:'Cinzel',serif;font-size:18px;font-weight:900;
  letter-spacing:3px;color:var(--rc2);text-shadow:0 0 16px var(--rc);
  line-height:1;transition:color 0.7s,text-shadow 0.7s;
}
.rank-div-label{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:var(--rc3);margin-top:3px;transition:color 0.7s}

.xp-section{margin-top:14px}
.xp-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.xp-lbl{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;color:var(--muted)}
.xp-val{font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;color:var(--rc2);transition:color 0.7s}
.xp-bar-wrap{height:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.06);overflow:visible}
.xp-bar{height:100%;background:linear-gradient(90deg,var(--rc3),var(--rc2));transition:width 0.5s cubic-bezier(0.4,0,0.2,1),background 0.7s,box-shadow 0.3s}
.xp-bar.full{animation:barPulse 1.6s ease-in-out infinite}
@keyframes barPulse{
  0%,100%{box-shadow:0 0 10px var(--rc),0 0 24px var(--rc2)}
  50%{box-shadow:0 0 22px var(--rc2),0 0 48px var(--rc),0 0 6px #fff}
}

/* ── LAYOUT ── */
.main-layout{
  display:grid;grid-template-columns:1fr 400px;
  gap:24px;padding:28px 24px 0;max-width:1120px;margin:0 auto;
}
@media(max-width:820px){.main-layout{grid-template-columns:1fr}}

/* ── RADAR ── */
.radar-wrap{
  background:var(--surface);border:1px solid var(--rc3);border-radius:3px;padding:24px;
  display:flex;flex-direction:column;align-items:center;
  animation:fadeUp 0.7s ease 0.15s both;
  box-shadow:var(--glow);transition:border-color 0.7s,box-shadow 0.7s;overflow:visible;
}
.section-title{
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:4px;
  color:var(--rc3);text-transform:uppercase;margin-bottom:18px;align-self:flex-start;transition:color 0.7s;
}
#radarCanvas{width:100%;max-width:380px;overflow:visible;display:block}
.stat-totals{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap;justify-content:center}
.stat-pill{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;padding:4px 10px;border:1px solid;border-radius:2px;display:flex;align-items:center;gap:5px}

/* ── TASKS ── */
.tasks-panel{display:flex;flex-direction:column;gap:10px;animation:fadeUp 0.7s ease 0.25s both}
.category-block{background:var(--surface);border:1px solid var(--rc3);border-radius:3px;overflow:hidden;transition:border-color 0.7s,box-shadow 0.15s}
.category-block:hover{box-shadow:var(--glow)}
.cat-header{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;cursor:pointer;user-select:none;transition:background 0.15s}
.cat-header:hover{background:var(--surface2)}
.cat-left{display:flex;align-items:center;gap:9px}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-name{font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px}
.cat-score{font-family:'Cinzel',serif;font-size:10px;color:var(--muted)}
.cat-chevron{font-size:9px;color:var(--muted);transition:transform 0.25s}
.cat-body{display:none;padding:0 15px 12px}
.cat-body.open{display:block}
.cat-chevron.open{transform:rotate(180deg)}

.task-item{display:flex;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.035);gap:6px}
.task-item:last-child{border-bottom:none}
.task-name{font-size:13px;color:var(--text);flex:1;line-height:1.3}
.task-count{font-family:'Cinzel',serif;font-size:10px;color:var(--muted);min-width:26px;text-align:center}

.del-btn{background:none;border:1px solid transparent;color:#2a1824;font-size:13px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:2px;cursor:pointer;transition:all 0.12s;flex-shrink:0}
.del-btn:hover{color:#e05050;border-color:#e0505040;background:rgba(224,80,80,0.07)}
.minus-btn{background:none;border:1px solid #2a1a2a;color:#6a3a5a;font-family:'Cinzel',serif;font-size:10px;padding:3px 7px;border-radius:2px;cursor:pointer;letter-spacing:1px;transition:all 0.12s;white-space:nowrap;flex-shrink:0}
.minus-btn:hover{background:rgba(160,40,80,0.12);border-color:#c05080;color:#e06080;box-shadow:0 0 6px rgba(200,60,100,0.4)}
.minus-btn:active{transform:scale(0.94)}
.plus-btn{background:none;border:1px solid var(--rc3);color:var(--rc2);font-family:'Cinzel',serif;font-size:10px;padding:3px 7px;border-radius:2px;cursor:pointer;letter-spacing:1px;transition:all 0.12s;white-space:nowrap;flex-shrink:0}
.plus-btn:hover{background:color-mix(in srgb,var(--rc) 18%,transparent);border-color:var(--rc2);box-shadow:0 0 7px var(--rc)}
.plus-btn:active{transform:scale(0.94)}

.add-task-row{display:flex;gap:7px;margin-top:9px}
.add-task-input{flex:1;background:var(--bg2);border:1px solid var(--rc3);color:var(--text);font-family:'Crimson Pro',serif;font-size:13px;padding:5px 9px;border-radius:2px;outline:none;transition:border-color 0.15s}
.add-task-input:focus{border-color:var(--rc)}
.add-task-input::placeholder{color:var(--muted)}
.add-task-btn{background:color-mix(in srgb,var(--rc) 14%,transparent);border:1px solid var(--rc3);color:var(--rc2);font-family:'Cinzel',serif;font-size:9px;padding:5px 10px;border-radius:2px;cursor:pointer;letter-spacing:1px;transition:all 0.12s}
.add-task-btn:hover{background:color-mix(in srgb,var(--rc) 24%,transparent)}

/* ── CALENDAR ── */
.calendar-wrap{max-width:1120px;margin:28px auto 48px;padding:0 24px;animation:fadeUp 0.7s ease 0.4s both}
.cal-card{background:var(--surface);border:1px solid var(--rc3);border-radius:3px;padding:24px 28px;box-shadow:var(--glow);transition:border-color 0.7s,box-shadow 0.7s}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.cal-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:4px;color:var(--rc3);text-transform:uppercase;transition:color 0.7s}
.cal-nav{display:flex;gap:8px;align-items:center}
.cal-nav-btn{background:none;border:1px solid var(--rc3);padding:0;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color 0.12s,box-shadow 0.12s;flex-shrink:0}
.cal-nav-btn:hover{border-color:var(--rc2);box-shadow:0 0 6px var(--rc)}
.cal-nav-btn:active{transform:scale(0.92)}
.cal-month-label{font-family:'Cinzel',serif;font-size:13px;letter-spacing:3px;color:var(--rc2);min-width:160px;text-align:center;transition:color 0.7s}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px}
.cal-dow{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--muted);text-align:center;padding:2px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:3px;position:relative;cursor:default}
.cal-day.empty{background:transparent}
.cal-day.no-data{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.05)}
.cal-day.no-data .day-num{font-family:'Cinzel',serif;font-size:9px;color:#333355}
.cal-day.future{background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.03)}
.cal-day.future .day-num{font-family:'Cinzel',serif;font-size:9px;color:#22223a}
.cal-day.has-data{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);cursor:pointer;transition:background 0.15s,box-shadow 0.15s}
.cal-day.has-data:hover{background:rgba(255,255,255,0.06)}
.cal-day.today{border:1px solid var(--rc)!important;box-shadow:0 0 8px color-mix(in srgb,var(--rc) 40%,transparent)}
.cal-day .day-num{font-family:'Cinzel',serif;font-size:8px;position:absolute;top:3px;left:5px;color:var(--muted);line-height:1}
.cal-day .day-badge{width:60%;height:60%;display:flex;align-items:center;justify-content:center;margin-top:4px}
.cal-day .day-badge svg{width:100%;height:100%}
.grey-dot{width:8px;height:8px;border-radius:50%;background:#22223a;margin:0 auto}
.cal-day.has-data::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#0d0d1e;border:1px solid var(--rc3);color:var(--text);font-family:'Cinzel',serif;font-size:8px;letter-spacing:1px;padding:3px 7px;border-radius:2px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity 0.15s;z-index:10}
.cal-day.has-data:hover::after{opacity:1}

/* ── TOAST ── */
#rankToast{
  position:fixed;top:20px;left:50%;
  transform:translateX(-50%) translateY(-130px);
  background:linear-gradient(135deg,#0c0a04,#181208);
  border:2px solid var(--rc);box-shadow:var(--glow-strong);
  padding:12px 24px 12px 16px;border-radius:3px;z-index:999;
  transition:transform 0.45s cubic-bezier(0.34,1.56,0.64,1),border-color 0.7s;
  pointer-events:none;display:flex;align-items:center;gap:14px;
}
#rankToast.show{transform:translateX(-50%) translateY(0)}
.toast-lbl{font-family:'Cinzel',serif;font-size:9px;letter-spacing:4px;color:var(--rc3)}
.toast-name{font-family:'Cinzel',serif;font-size:20px;letter-spacing:3px;margin-top:2px}
.toast-div{font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;color:var(--rc3);margin-top:1px}
#toastBadge{width:52px;height:52px;flex-shrink:0}

@keyframes fadeDown{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- SETUP OVERLAY -->
<div id="setupOverlay">
  <div class="setup-card">
    <div class="sc-bl"></div><div class="sc-br"></div>
    <div class="setup-eyebrow">// Quest Log</div>
    <div class="setup-headline">Enter Your<br>Name</div>
    <div class="setup-sub">Your name will appear on your player card</div>
    <input class="setup-input" id="setupInput" placeholder="YOUR NAME" maxlength="16" autocomplete="off">
    <button class="setup-btn" id="setupBtn">Begin Quest</button>
  </div>
</div>

<!-- RANK TOAST -->
<div id="rankToast">
  <div id="toastBadge"></div>
  <div>
    <div class="toast-lbl">▲ RANK UP ▲</div>
    <div class="toast-name" id="toastName"></div>
    <div class="toast-div" id="toastDiv"></div>
  </div>
</div>

<!-- HEADER -->
<div class="header-wrap">
  <div class="player-card">
    <div class="corner-bl"></div><div class="corner-br"></div>
    <button class="edit-name-btn" id="editNameBtn" title="Edit name">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M9.5 2.5L11.5 4.5L4.5 11.5H2.5V9.5L9.5 2.5Z" stroke="var(--rc2)" stroke-width="1.2" stroke-linejoin="round"/>
        <path d="M8 4L10 6" stroke="var(--rc2)" stroke-width="1.2"/>
      </svg>
    </button>
    <div class="player-name" id="playerName">PLAYER</div>
    <div class="player-date" id="dateLabel"></div>
    <div class="rank-badge-row">
      <div id="rankBadge" class="rank-badge-img"></div>
      <div class="rank-text">
        <div class="rank-label" id="rankLabel">ROOKIE</div>
        <div class="rank-div-label" id="divLabel">DIVISION IV</div>
      </div>
    </div>
    <div class="xp-section">
      <div class="xp-info">
        <span class="xp-lbl">DAILY XP</span>
        <span class="xp-val" id="xpVal">0 / 150</span>
      </div>
      <div class="xp-bar-wrap">
        <div class="xp-bar" id="xpBar" style="width:0%"></div>
      </div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main-layout">
  <div class="radar-wrap">
    <div class="section-title">// Stat Overview</div>
    <canvas id="radarCanvas" width="420" height="420"></canvas>
    <div class="stat-totals" id="statTotals"></div>
  </div>
  <div class="tasks-panel" id="tasksPanel"></div>
</div>

<!-- CALENDAR -->
<div class="calendar-wrap">
  <div class="cal-card">
    <div class="cal-header">
      <div class="cal-title">// Daily Rank History</div>
      <div class="cal-nav">
        <button class="cal-nav-btn" id="calPrev" title="Previous month">
          <svg width="14" height="14" viewBox="0 0 7 7" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
            <rect x="4" y="0" width="1" height="1" fill="var(--rc2)"/>
            <rect x="3" y="1" width="1" height="1" fill="var(--rc2)"/>
            <rect x="2" y="2" width="1" height="1" fill="var(--rc2)"/>
            <rect x="1" y="3" width="1" height="1" fill="var(--rc2)"/>
            <rect x="2" y="4" width="1" height="1" fill="var(--rc2)"/>
            <rect x="3" y="5" width="1" height="1" fill="var(--rc2)"/>
            <rect x="4" y="6" width="1" height="1" fill="var(--rc2)"/>
            <rect x="5" y="1" width="1" height="1" fill="var(--rc3)"/>
            <rect x="5" y="5" width="1" height="1" fill="var(--rc3)"/>
          </svg>
        </button>
        <div class="cal-month-label" id="calMonthLabel"></div>
        <button class="cal-nav-btn" id="calNext" title="Next month">
          <svg width="14" height="14" viewBox="0 0 7 7" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
            <rect x="2" y="0" width="1" height="1" fill="var(--rc2)"/>
            <rect x="3" y="1" width="1" height="1" fill="var(--rc2)"/>
            <rect x="4" y="2" width="1" height="1" fill="var(--rc2)"/>
            <rect x="5" y="3" width="1" height="1" fill="var(--rc2)"/>
            <rect x="4" y="4" width="1" height="1" fill="var(--rc2)"/>
            <rect x="3" y="5" width="1" height="1" fill="var(--rc2)"/>
            <rect x="2" y="6" width="1" height="1" fill="var(--rc2)"/>
            <rect x="1" y="1" width="1" height="1" fill="var(--rc3)"/>
            <rect x="1" y="5" width="1" height="1" fill="var(--rc3)"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="cal-dow-row">
      <div class="cal-dow">SUN</div><div class="cal-dow">MON</div>
      <div class="cal-dow">TUE</div><div class="cal-dow">WED</div>
      <div class="cal-dow">THU</div><div class="cal-dow">FRI</div>
      <div class="cal-dow">SAT</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────
// BADGE SVG
// ─────────────────────────────────────────────────────────────────
function makeBadgeSVG(rankName, size) {
  size = size || 64;
  var cfg = {
    'ROOKIE':  {bg:'#1a0e06',border:'#8B5C2A',shine:'#D4935A',shape:'hex',   label:'R', chevrons:0, lc:'#D4935A', inner:'#5C3518'},
    'BRONZE':  {bg:'#1a0c04',border:'#7a4010',shine:'#C06820',shape:'hex',   label:'B', chevrons:1, lc:'#C06820', inner:'#4a2008'},
    'SILVER':  {bg:'#0e0e18',border:'#707090',shine:'#B0B0D0',shape:'hex',   label:'S', chevrons:2, lc:'#C0C0E0', inner:'#404060'},
    'GOLD':    {bg:'#140e00',border:'#B08800',shine:'#FFD700',shape:'hex',   label:'G', chevrons:3, lc:'#FFD700', inner:'#6a5000'},
    'PLATINUM':{bg:'#001428',border:'#0055BB',shine:'#44AAFF',shape:'hex',   label:'P', chevrons:3, lc:'#44AAFF', inner:'#002255'},
    'DIAMOND': {bg:'#0a0018',border:'#7700CC',shine:'#CC66FF',shape:'diamond',label:'D',chevrons:0, lc:'#CC66FF', inner:'#3a006a'},
    'MASTER':  {bg:'#1a0000',border:'#AA0000',shine:'#FF4444',shape:'crown', label:'M', chevrons:0, lc:'#FF6666', inner:'#600000'},
    'APEX':    {bg:'#1a0000',border:'#FF2200',shine:'#FF6644',shape:'skull', label:'A', chevrons:0, lc:'#FF4422', inner:'#800000'}
  };
  var d = cfg[rankName] || cfg['ROOKIE'];
  var cx = size/2, cy = size/2, sc = size/64;

  function hexPts(r, rot) {
    rot = rot || 0;
    var pts = [];
    for (var i = 0; i < 6; i++) {
      var a = Math.PI/180*(60*i+rot);
      pts.push((cx+r*Math.cos(a)).toFixed(1)+','+(cy+r*Math.sin(a)).toFixed(1));
    }
    return pts.join(' ');
  }
  function diamondPts(r) {
    return cx+','+( cy-r)+' '+(cx+r*0.72)+','+cy+' '+cx+','+(cy+r)+' '+(cx-r*0.72)+','+cy;
  }

  var shape = '', extras = '';

  if (d.shape === 'hex') {
    var oR=28*sc, iR=20*sc, mR=23*sc;
    shape = '<polygon points="'+hexPts(oR,90)+'" fill="'+d.bg+'" stroke="'+d.border+'" stroke-width="'+(2.5*sc)+'"/>'
          + '<polygon points="'+hexPts(mR,90)+'" fill="none" stroke="'+d.shine+'" stroke-width="'+(0.8*sc)+'" opacity="0.45"/>'
          + '<polygon points="'+hexPts(iR,90)+'" fill="'+d.inner+'" stroke="'+d.border+'" stroke-width="'+(1*sc)+'"/>';
    for (var c = 0; c < d.chevrons; c++) {
      var y0 = (46 - c*5)*sc;
      extras += '<polyline points="'+(24*sc)+','+y0+' '+(32*sc)+','+(y0-5*sc)+' '+(40*sc)+','+y0+'" fill="none" stroke="'+d.shine+'" stroke-width="'+(1.8*sc)+'" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>';
    }
  } else if (d.shape === 'diamond') {
    shape = '<polygon points="'+diamondPts(30*sc)+'" fill="'+d.bg+'" stroke="'+d.border+'" stroke-width="'+(2.5*sc)+'"/>'
          + '<polygon points="'+diamondPts(22*sc)+'" fill="'+d.inner+'" stroke="'+d.shine+'" stroke-width="'+(0.8*sc)+'" opacity="0.6"/>';
    extras = '<line x1="'+cx+'" y1="'+(cy-30*sc)+'" x2="'+cx+'" y2="'+(cy+30*sc)+'" stroke="'+d.shine+'" stroke-width="'+(0.4*sc)+'" opacity="0.25"/>'
           + '<line x1="'+(cx-22*sc*0.72)+'" y1="'+cy+'" x2="'+(cx+22*sc*0.72)+'" y2="'+cy+'" stroke="'+d.shine+'" stroke-width="'+(0.4*sc)+'" opacity="0.25"/>';
  } else if (d.shape === 'crown') {
    var oR2=28*sc;
    shape = '<polygon points="'+hexPts(oR2,90)+'" fill="'+d.bg+'" stroke="'+d.border+'" stroke-width="'+(2.5*sc)+'"/>'
          + '<polygon points="'+hexPts(20*sc,90)+'" fill="'+d.inner+'" stroke="'+d.border+'" stroke-width="'+(1*sc)+'"/>';
    extras = '<polyline points="'+(20*sc)+','+(34*sc)+' '+(20*sc)+','+(22*sc)+' '+(26*sc)+','+(28*sc)+' '+(32*sc)+','+(16*sc)+' '+(38*sc)+','+(28*sc)+' '+(44*sc)+','+(22*sc)+' '+(44*sc)+','+(34*sc)+'" fill="'+d.inner+'" stroke="'+d.shine+'" stroke-width="'+(2*sc)+'" stroke-linejoin="round"/>'
           + '<rect x="'+(20*sc)+'" y="'+(34*sc)+'" width="'+(24*sc)+'" height="'+(6*sc)+'" fill="'+d.shine+'" rx="'+(1*sc)+'" opacity="0.9"/>';
  } else if (d.shape === 'skull') {
    var spikes = [];
    for (var s = 0; s < 12; s++) {
      var ang = (Math.PI*2*s/12) - Math.PI/2;
      var rr = (s%2===0 ? 30 : 23)*sc;
      spikes.push((cx+rr*Math.cos(ang)).toFixed(1)+','+(cy+rr*Math.sin(ang)).toFixed(1));
    }
    shape = '<polygon points="'+spikes.join(' ')+'" fill="'+d.bg+'" stroke="'+d.border+'" stroke-width="'+(2*sc)+'"/>'
          + '<circle cx="'+cx+'" cy="'+cy+'" r="'+(18*sc)+'" fill="'+d.inner+'" stroke="'+d.shine+'" stroke-width="'+(1.2*sc)+'"/>';
    var ey = cy - 5*sc;
    extras = '<circle cx="'+(cx-5*sc)+'" cy="'+ey+'" r="'+(3.5*sc)+'" fill="'+d.bg+'"/>'
           + '<circle cx="'+(cx+5*sc)+'" cy="'+ey+'" r="'+(3.5*sc)+'" fill="'+d.bg+'"/>'
           + '<circle cx="'+(cx-5*sc)+'" cy="'+ey+'" r="'+(2*sc)+'" fill="'+d.shine+'" opacity="0.9"/>'
           + '<circle cx="'+(cx+5*sc)+'" cy="'+ey+'" r="'+(2*sc)+'" fill="'+d.shine+'" opacity="0.9"/>'
           + '<path d="M'+(cx-5*sc)+','+(cy+4*sc)+' Q'+cx+','+(cy+9*sc)+' '+(cx+5*sc)+','+(cy+4*sc)+'" fill="none" stroke="'+d.shine+'" stroke-width="'+(1.5*sc)+'" opacity="0.8"/>'
           + '<line x1="'+(cx-3*sc)+'" y1="'+(cy+4*sc)+'" x2="'+(cx-3*sc)+'" y2="'+(cy+7*sc)+'" stroke="'+d.shine+'" stroke-width="'+(1*sc)+'" opacity="0.6"/>'
           + '<line x1="'+cx+'" y1="'+(cy+4*sc)+'" x2="'+cx+'" y2="'+(cy+8*sc)+'" stroke="'+d.shine+'" stroke-width="'+(1*sc)+'" opacity="0.6"/>'
           + '<line x1="'+(cx+3*sc)+'" y1="'+(cy+4*sc)+'" x2="'+(cx+3*sc)+'" y2="'+(cy+7*sc)+'" stroke="'+d.shine+'" stroke-width="'+(1*sc)+'" opacity="0.6"/>';
  }

  var fs = d.label.length > 1 ? 9*sc : 13*sc;
  var labelEl = '<text x="'+cx+'" y="'+(cy+fs*0.38)+'" text-anchor="middle" dominant-baseline="middle" font-family="Cinzel,serif" font-weight="900" font-size="'+fs+'" fill="'+d.lc+'" filter="url(#gl)">'+d.label+'</text>';

  return '<svg xmlns="http://www.w3.org/2000/svg" width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'
    + '<defs>'
    + '<filter id="gl" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur in="SourceGraphic" stdDeviation="'+(1.8*sc)+'" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>'
    + '<filter id="sh"><feDropShadow dx="0" dy="0" stdDeviation="'+(3*sc)+'" flood-color="'+d.shine+'" flood-opacity="0.55"/></filter>'
    + '</defs>'
    + '<g filter="url(#sh)">'+shape+extras+labelEl+'</g>'
    + '</svg>';
}

var TOTAL_XP_MAX = 150;

var TIER_WEIGHTS = [
  1,1,1.2,1.4,        // Rookie IV-I
  1.6,1.8,2,2.2,      // Bronze IV-I
  2.5,2.8,3,3.2,      // Silver IV-I
  3.5,3.8,4,4.2,      // Gold   IV-I
  4.5,5,5.5,6,        // Platinum IV-I
  6.5,7,7.5,8,        // Diamond  IV-I
  12,                  // Master
  18                   // Apex
];

var RANK_COLORS = {
  ROOKIE:   {main:'#c87c3a',bright:'#e8a050',dark:'#3d2010'},
  BRONZE:   {main:'#a05020',bright:'#d08040',dark:'#401808'},
  SILVER:   {main:'#8888aa',bright:'#c0c0dc',dark:'#282840'},
  GOLD:     {main:'#cc9900',bright:'#ffcc00',dark:'#503800'},
  PLATINUM: {main:'#2266cc',bright:'#44aaff',dark:'#001040'},
  DIAMOND:  {main:'#8822cc',bright:'#cc55ff',dark:'#200040'},
  MASTER:   {main:'#cc1111',bright:'#ff4444',dark:'#3a0000'},
  APEX:     {main:'#ff2200',bright:'#ff6644',dark:'#500000'}
};

function buildRankTiers() {
  var names     = ['ROOKIE','BRONZE','SILVER','GOLD','PLATINUM','DIAMOND','MASTER','APEX'];
  var divCounts = [4,4,4,4,4,4,1,1];
  var divNames  = ['IV','III','II','I'];
  var totalW    = TIER_WEIGHTS.reduce(function(a,b){return a+b;}, 0);
  var tiers     = [];
  var xp = 0, wi = 0;
  names.forEach(function(name, ni) {
    var dc = divCounts[ni];
    for (var d = 0; d < dc; d++) {
      var div = dc === 1 ? null : divNames[d];
      tiers.push({name:name, div:div, label:div ? name+' '+div : name, xp:Math.round(xp), color:RANK_COLORS[name]});
      xp += (TIER_WEIGHTS[wi++] || 1) / totalW * TOTAL_XP_MAX;
    }
  });
  return tiers;
}

var RANK_TIERS = buildRankTiers();

function getTier(xp) {
  var t = RANK_TIERS[0];
  for (var i = 0; i < RANK_TIERS.length; i++) {
    if (xp >= RANK_TIERS[i].xp) t = RANK_TIERS[i]; else break;
  }
  return t;
}
function getNextTier(xp) {
  for (var i = 0; i < RANK_TIERS.length; i++) { if (xp < RANK_TIERS[i].xp) return RANK_TIERS[i]; }
  return null;
}

// ─────────────────────────────────────────────────────────────────
// RADAR
// ─────────────────────────────────────────────────────────────────
var RADAR_MAX = 30;

function seededRand(seed) {
  var s = seed;
  return function() { s = (s*9301+49297)%233280; return s/233280; };
}

function drawRadar() {
  var canvas = document.getElementById('radarCanvas');
  var ctx    = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height, cx = W/2, cy = H/2;
  var R = Math.min(W,H)*0.33, n = 5;
  var angles = CATEGORIES.map(function(_,i){ return (Math.PI*2*i/n) - Math.PI/2; });
  ctx.clearRect(0,0,W,H);

  // Grid rings
  for (var ring = 1; ring <= 5; ring++) {
    var r = R*ring/5;
    ctx.beginPath();
    for (var i = 0; i < n; i++) {
      var x = cx+r*Math.cos(angles[i]), y = cy+r*Math.sin(angles[i]);
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle = ring===5 ? 'rgba(201,168,76,0.3)' : 'rgba(255,255,255,0.055)';
    ctx.lineWidth   = ring===5 ? 1.5 : 1;
    ctx.setLineDash([]); ctx.stroke();
  }

  // Ring labels
  ctx.font = "8px 'Cinzel',serif"; ctx.fillStyle = 'rgba(255,255,255,0.18)'; ctx.textAlign = 'center';
  [6,12,18,24,30].forEach(function(v,i){ var r=R*(i+1)/5; ctx.fillText(v, cx+4, cy-r+9); });

  // Spokes
  for (var i = 0; i < n; i++) {
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.lineTo(cx+R*Math.cos(angles[i]), cy+R*Math.sin(angles[i]));
    ctx.strokeStyle='rgba(255,255,255,0.065)'; ctx.lineWidth=1; ctx.stroke();
  }

  // Points
  var pts = CATEGORIES.map(function(c,i) {
    var score    = state.scores[c.key] || 0;
    var overflow = Math.max(0, score - RADAR_MAX);
    var r;
    if (overflow > 0) {
      r = R * (1 + Math.min(overflow,20)/20*0.45);
    } else {
      r = R * (Math.min(score, RADAR_MAX) / RADAR_MAX);
    }
    var rnd = seededRand(i*1000 + score);
    return {
      x: cx + r*Math.cos(angles[i]) + (overflow>0 ? (rnd()-0.5)*10 : 0),
      y: cy + r*Math.sin(angles[i]) + (overflow>0 ? (rnd()-0.5)*10 : 0),
      color: c.color, overflow: overflow>0, score: score
    };
  });

  // Fill
  ctx.beginPath();
  pts.forEach(function(p,i){ i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y); });
  ctx.closePath(); ctx.fillStyle='rgba(200,168,76,0.07)'; ctx.fill();

  // Edges
  for (var i = 0; i < n; i++) {
    var a = pts[i], b = pts[(i+1)%n], broken = a.overflow || b.overflow;
    ctx.beginPath();
    if (broken) {
      var rnd2 = seededRand(i*77 + a.score + b.score);
      var mx = (a.x+b.x)/2 + (rnd2()-0.5)*14, my = (a.y+b.y)/2 + (rnd2()-0.5)*14;
      var g2 = ctx.createLinearGradient(a.x,a.y,b.x,b.y);
      g2.addColorStop(0, CATEGORIES[i].color+'bb');
      g2.addColorStop(1, CATEGORIES[(i+1)%n].color+'bb');
      ctx.moveTo(a.x,a.y); ctx.lineTo(mx,my); ctx.lineTo(b.x,b.y);
      ctx.strokeStyle=g2; ctx.lineWidth=1.8; ctx.setLineDash([4,2]);
    } else {
      var g = ctx.createLinearGradient(a.x,a.y,b.x,b.y);
      g.addColorStop(0, CATEGORIES[i].color+'cc');
      g.addColorStop(1, CATEGORIES[(i+1)%n].color+'cc');
      ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
      ctx.strokeStyle=g; ctx.lineWidth=2; ctx.setLineDash([]);
    }
    ctx.stroke(); ctx.setLineDash([]);
  }

  // Crackle rays (overflow, skill color)
  pts.forEach(function(p,i) {
    if (!p.overflow) return;
    var rnd3 = seededRand(i*333 + p.score);
    var col  = CATEGORIES[i].color;
    var r2=parseInt(col.slice(1,3),16), g2=parseInt(col.slice(3,5),16), b2=parseInt(col.slice(5,7),16);
    for (var r = 0; r < 5; r++) {
      var ang = angles[i]+(r-2)*0.28, len = 10+rnd3()*8;
      ctx.beginPath(); ctx.moveTo(p.x,p.y);
      ctx.lineTo(p.x+Math.cos(ang)*len, p.y+Math.sin(ang)*len);
      ctx.strokeStyle = 'rgba('+r2+','+g2+','+b2+','+(0.55-r*0.07)+')';
      ctx.lineWidth   = 1.3 - r*0.18; ctx.stroke();
    }
  });

  // Normal dots
  pts.forEach(function(p,i) {
    if (p.overflow) return;
    ctx.beginPath(); ctx.arc(p.x,p.y,4.5,0,Math.PI*2);
    ctx.fillStyle=CATEGORIES[i].color; ctx.shadowColor=CATEGORIES[i].color; ctx.shadowBlur=10;
    ctx.fill(); ctx.shadowBlur=0;
  });

  // Axis labels
  CATEGORIES.forEach(function(c,i) {
    var lr=R+36, x=cx+lr*Math.cos(angles[i]), y=cy+lr*Math.sin(angles[i]);
    ctx.font="bold 10px 'Cinzel',serif"; ctx.fillStyle=c.color; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor=c.color; ctx.shadowBlur=7;
    ctx.fillText(c.name.toUpperCase(), x, y+9); ctx.shadowBlur=0;
  });

  // Stat pills
  document.getElementById('statTotals').innerHTML = CATEGORIES.map(function(c) {
    var ov = (state.scores[c.key]||0) > RADAR_MAX, col = ov ? '#ff6644' : c.color;
    return '<div class="stat-pill" style="color:'+col+';border-color:'+col+'44">'+c.name.slice(0,3).toUpperCase()+' <strong>'+(state.scores[c.key]||0)+'</strong>'+(ov?'▲':'')+'</div>';
  }).join('');
}

    +'<div class="task-name">'+esc(taskName)+'</div>'

    +'<button class="minus-btn" data-cat="'+catKey+'" data-idx="'+idx+'">-1</button>'
    +'<button class="plus-btn"  data-cat="'+catKey+'" data-idx="'+idx+'">+1 XP</button>'

}

function buildTasksPanel() {

        +'<div style="display:flex;align-items:center;gap:10px">'
          +'<div class="cat-score" id="score-'+cat.key+'">'+(state.scores[cat.key]||0)+' pts</div>'
          +'<div class="cat-chevron" id="chev-'+cat.key+'">▼</div>'
        +'</div>'
      +'</div>'
      +'<div class="cat-body" id="body-'+cat.key+'">'
        +'<div id="tasklist-'+cat.key+'">'+tasks.map(function(t,i){ return taskHTML(cat.key,t,i); }).join('')+'</div>'
        +'<div class="add-task-row">'
          +'<input class="add-task-input" id="input-'+cat.key+'" data-cat="'+cat.key+'" placeholder="Add new task…" maxlength="60">'
          +'<button class="add-task-btn" data-cat="'+cat.key+'">+ ADD</button>'
        +'</div>'
      +'</div>';
    panel.appendChild(block);
  });
}

function toggleCat(key) {
  document.getElementById('body-'+key).classList.toggle('open');
  document.getElementById('chev-'+key).classList.toggle('open');
}

function addPoint(catKey, idx) {
  if (!state.scores) state.scores = {};
  if (!state.taskCounts) state.taskCounts = {};
  if (!state.taskCounts[catKey]) state.taskCounts[catKey] = {};
  state.scores[catKey]         = (state.scores[catKey] || 0) + 1;
  state.totalXP                = (state.totalXP || 0) + 1;
  state.taskCounts[catKey][idx]= (state.taskCounts[catKey][idx] || 0) + 1;

  document.getElementById('score-'+catKey).textContent = state.scores[catKey]+' pts';
  var cntEl = document.getElementById('cnt-'+catKey+'-'+idx);
  if (cntEl) cntEl.textContent = '×'+state.taskCounts[catKey][idx];

  var btn = document.querySelector('#task-'+catKey+'-'+idx+' .plus-btn');
  if (btn) {
    btn.style.background  = 'color-mix(in srgb,var(--rc) 28%,transparent)';
    btn.style.boxShadow   = '0 0 10px var(--rc)';
    setTimeout(function(){ btn.style.background=''; btn.style.boxShadow=''; }, 280);
  }
  drawRadar(); updateRankUI();
}

function removePoint(catKey, idx) {
  if (!state.scores || !state.scores[catKey] || state.scores[catKey] <= 0) return;
  state.scores[catKey]--;
  state.totalXP = Math.max(0, (state.totalXP||0) - 1);
  if (state.taskCounts && state.taskCounts[catKey] && state.taskCounts[catKey][idx] > 0)
    state.taskCounts[catKey][idx]--;

  document.getElementById('score-'+catKey).textContent = state.scores[catKey]+' pts';
  var cntEl = document.getElementById('cnt-'+catKey+'-'+idx);
  if (cntEl) cntEl.textContent = (state.taskCounts && state.taskCounts[catKey] && state.taskCounts[catKey][idx] > 0) ? '×'+state.taskCounts[catKey][idx] : '';

  var btn = document.querySelector('#task-'+catKey+'-'+idx+' .minus-btn');
  if (btn) {
    btn.style.background = 'rgba(160,40,80,0.22)';
    btn.style.boxShadow  = '0 0 8px rgba(200,60,100,0.5)';
    setTimeout(function(){ btn.style.background=''; btn.style.boxShadow=''; }, 280);
  }
  drawRadar(); updateRankUI();
}

function deleteTask(catKey, idx) {
  var el = document.getElementById('task-'+catKey+'-'+idx);
  if (!el) return;
  el.style.transition = 'opacity 0.2s,transform 0.2s';
  el.style.opacity    = '0';
  el.style.transform  = 'translateX(12px)';
  setTimeout(function() {
    state.tasks[catKey].splice(idx, 1);
    var oldC = (state.taskCounts && state.taskCounts[catKey]) || {}, newC = {};
    Object.keys(oldC).forEach(function(k) {
      var ki = parseInt(k);
      if (ki < idx)       newC[ki]     = oldC[k];
      else if (ki > idx)  newC[ki-1]   = oldC[k];
    });
    if (!state.taskCounts) state.taskCounts = {};
    state.taskCounts[catKey] = newC;
    persist.tasks = state.tasks;
    save();
    document.getElementById('tasklist-'+catKey).innerHTML =
      state.tasks[catKey].map(function(t,i){ return taskHTML(catKey,t,i); }).join('');
  }, 220);
}

function addTask(catKey) {
  var input = document.getElementById('input-'+catKey);
  var name  = input.value.trim();
  if (!name) return;
  if (!state.tasks[catKey]) state.tasks[catKey] = [];
  var idx = state.tasks[catKey].length;
  state.tasks[catKey].push(name);
  persist.tasks = state.tasks;
  save(); input.value = '';
  var list = document.getElementById('tasklist-'+catKey);
  var tmp  = document.createElement('div');
  tmp.innerHTML = taskHTML(catKey, name, idx);
  list.appendChild(tmp.firstElementChild);
}

// ─────────────────────────────────────────────────────────────────
// CALENDAR
// ─────────────────────────────────────────────────────────────────
var calYear  = new Date().getFullYear();
var calMonth = new Date().getMonth();
var CAL_MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function renderCalendar() {
  document.getElementById('calMonthLabel').textContent = CAL_MONTHS[calMonth].toUpperCase()+'  '+calYear;
  var grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  var firstDay    = new Date(calYear, calMonth, 1).getDay();
  var daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  var now         = new Date();
  var isCurMonth  = calYear===now.getFullYear() && calMonth===now.getMonth();
  var todayDate   = now.getDate();

  for (var e = 0; e < firstDay; e++) {
    var empty = document.createElement('div'); empty.className='cal-day empty'; grid.appendChild(empty);
  }

  for (var d = 1; d <= daysInMonth; d++) {
    var cell    = document.createElement('div');
    var dateKey = calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var isToday = isCurMonth && d===todayDate;
    var isFuture= (calYear>now.getFullYear()) ||
      (calYear===now.getFullYear() && calMonth>now.getMonth()) ||
      (isCurMonth && d>todayDate);
    var hist    = persist.history[dateKey];

    var numEl = document.createElement('div'); numEl.className='day-num'; numEl.textContent=d;

    if (isFuture && !isToday) {
      cell.className = 'cal-day future';
      cell.appendChild(numEl);
    } else if (hist) {
      cell.className = 'cal-day has-data'+(isToday?' today':'');
      cell.setAttribute('data-tip', hist.rankName+(hist.div?' '+hist.div:'')+' · '+hist.totalXP+' XP');
      var tier2 = getTier(hist.totalXP);
      cell.style.borderColor = isToday ? tier2.color.main : tier2.color.dark;
      cell.style.boxShadow   = 'inset 0 0 8px '+tier2.color.dark+'55';
      var badgeEl = document.createElement('div'); badgeEl.className='day-badge';
      badgeEl.innerHTML = makeBadgeSVG(hist.rankName, 36);
      cell.appendChild(numEl); cell.appendChild(badgeEl);
    } else {
      cell.className = 'cal-day no-data'+(isToday?' today':'');
      var dot = document.createElement('div'); dot.className='grey-dot';
      cell.appendChild(numEl); cell.appendChild(dot);
    }

    grid.appendChild(cell);
  }
}

// ─────────────────────────────────────────────────────────────────
// NAME SETUP
// ─────────────────────────────────────────────────────────────────
function confirmName() {
  var raw = document.getElementById('setupInput').value.trim();
  if (!raw) return;
  var name = raw.toUpperCase().slice(0, 16);
  persist.playerName = name;
  save();
  document.getElementById('playerName').textContent = name;
  document.getElementById('setupOverlay').classList.add('hidden');
}

function openSetup() {
  document.getElementById('setupInput').value = persist.playerName || '';
  document.getElementById('setupOverlay').classList.remove('hidden');
  setTimeout(function(){ document.getElementById('setupInput').focus(); }, 50);
}

// ─────────────────────────────────────────────────────────────────
// EVENT DELEGATION — one listener per panel, no inline handlers
// ─────────────────────────────────────────────────────────────────
document.getElementById('tasksPanel').addEventListener('click', function(e) {
  var t = e.target;
  if (t.classList.contains('plus-btn'))  { addPoint(t.dataset.cat, +t.dataset.idx); return; }
  if (t.classList.contains('minus-btn')) { removePoint(t.dataset.cat, +t.dataset.idx); return; }
  if (t.classList.contains('del-btn'))   { deleteTask(t.dataset.cat, +t.dataset.idx); return; }
  if (t.classList.contains('add-task-btn')) { addTask(t.dataset.cat); return; }
  var header = t.closest('.cat-header');
  if (header) toggleCat(header.dataset.cat);
});

document.getElementById('tasksPanel').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && e.target.classList.contains('add-task-input')) {
    addTask(e.target.dataset.cat);
  }
});

document.getElementById('setupBtn').addEventListener('click', confirmName);
document.getElementById('setupInput').addEventListener('keydown', function(e){ if(e.key==='Enter') confirmName(); });
document.getElementById('editNameBtn').addEventListener('click', openSetup);
document.getElementById('calPrev').addEventListener('click', function(){ calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); });
document.getElementById('calNext').addEventListener('click', function(){ calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); });

// ─────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────
if (!persist.playerName) {
  setTimeout(function(){ document.getElementById('setupInput').focus(); }, 100);
} else {
  document.getElementById('playerName').textContent = persist.playerName;
  document.getElementById('setupOverlay').classList.add('hidden');
}

buildTasksPanel();
drawRadar();
updateRankUI();
renderCalendar();
toggleCat('str');

// Register service worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function(e){ console.log('SW error:', e); });
}
</script>
